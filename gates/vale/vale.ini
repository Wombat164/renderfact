# gates/vale/vale.ini: the GENERIC-CORE default Vale config (chunk B3a).
#
# Deliberately minimal: only Vale's built-in style, no custom style package, so
# the gate runs from a clean checkout with nothing but the vale binary. The
# split of levels is the design:
#   Vale.Repetition = error    repeated words ("the the"): deterministic,
#                              language-agnostic-ish, always a defect -> BLOCKS
#   Vale.Spelling   = warning  English dictionary: valuable signal but noisy on
#                              technical vocabulary -> reported, never blocks
# A consumer's real prose rules (house terminology, register, locale) are
# private-skin config: point RENDERFACT_VALE_CONFIG (or --vale-config) at your
# own ini + styles, this file is only the floor.
MinAlertLevel = warning

[*.md]
BasedOnStyles = Vale
Vale.Spelling = warning
Vale.Repetition = error
