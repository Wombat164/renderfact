# demo/skin/vale/vale.ini: a CONSUMER Vale config (the demo skin's own prose rules).
#
# Demonstrates the override mechanism: the generic core ships only built-in checks
# (gates/vale/vale.ini); an organisation's writing doctrine lives in its skin, like
# this file. Derived from demo/skin/writing-golden-rules.md: the deterministic slice
# of the fluff taxonomy (throat-clearing blocks, hedges warn) on top of the core
# built-ins. Point the gate at it:
#   RENDERFACT_VALE_CONFIG=demo/skin/vale/vale.ini render gate <files> --stages vale
#
# AiTells (vendored from tbhb/vale-ai-tells, MIT) detects AI-writing tells. Unlike
# BeNl (Dutch-specific, opt-in via vale.be-nl.ini), AI tells are language-agnostic
# and relevant to essentially every document, so they are always-on in this base
# config. See styles/AiTells/README.md for the vendor source and license.
#
# PlainLanguage (issue #76) is a distinct concern from AiTells: not "does this
# read like AI wrote it" but "will a plain reader follow it." Sentence length
# and nominalisation density, English-first, both warning-level advisory (the
# deterministic layer underneath an LLM tone/register pass, same relationship
# AiTells has to one, not a blocking gate on their own). See
# styles/PlainLanguage/README.md.
StylesPath = styles
MinAlertLevel = warning

[*.md]
BasedOnStyles = Vale, GoldenRules, AiTells, PlainLanguage
Vale.Spelling = warning
Vale.Repetition = error
