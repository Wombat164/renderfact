# demo/skin/vale/vale.be-nl.ini: OPT-IN companion to vale.ini for BE-NL (Flemish)
# formal-register documents. Not folded into the default [*.md] BasedOnStyles in
# vale.ini because the BeNl checks (NL-NL lexical tells) would false-positive on
# any non-Dutch document; a consumer producing BE-NL output points the gate here
# explicitly instead. See ../writing-golden-rules-be-nl.md for the rules this
# mechanises.
StylesPath = styles
MinAlertLevel = warning

[*.md]
BasedOnStyles = Vale, GoldenRules, BeNl
Vale.Spelling = warning
Vale.Repetition = error
