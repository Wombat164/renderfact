# demo.yml: render the bundled example end-to-end on real engines, so the demo is
# a CI-verified working example (the `demo` badge), not just something the unit
# tests skip when typst/pandoc are absent. Installs the tools.lock-pinned pandoc
# and typst, runs demo/render-demo.sh (projection + tokens + DOCX + branded PDF),
# and asserts the artifacts exist.
name: demo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  render-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e .

      - name: Install pandoc 3.10 (tools.lock)
        run: |
          curl -fsSL -o /tmp/pandoc.deb \
            https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-1-amd64.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      - name: Install typst 0.15.0 (tools.lock)
        run: |
          curl -fsSL -o /tmp/typst.tar.xz \
            https://github.com/typst/typst/releases/download/v0.15.0/typst-x86_64-unknown-linux-musl.tar.xz
          tar -C /tmp -xf /tmp/typst.tar.xz
          sudo install /tmp/typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          typst --version

      - name: Render the demo end-to-end
        run: bash demo/render-demo.sh

      - name: Verify the artifacts
        run: |
          test -s demo/renders/agm-minutes.pdf
          head -c4 demo/renders/agm-minutes.pdf | grep -q '%PDF'
          ls demo/renders/signalling-it-refresh--internal-full.md
          ls demo/renders/signalling-it-refresh--public-tender.md
          echo "demo rendered: branded PDF + three governed projections"
