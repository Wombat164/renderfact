# PUBLIC release.yml (staged; the sweep promotes this to
# .github/workflows/release.yml alongside ci.yml). Deliberately NOT active in
# the private phase: a tag push here would attempt a premature publish.
#
# Publishes to PyPI via Trusted Publishing (OIDC): no long-lived token in CI.
# One-time setup on PyPI (after the name is registered): project settings ->
# Publishing -> add GitHub publisher: owner Wombat164, repository renderfact,
# workflow release.yml, environment pypi.
name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
