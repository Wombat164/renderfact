# template-profile-example.yaml: config-driven house-style profile for
# docstyle/style_postprocess.py (pass with --template-profile) and
# docstyle/heading_numbering.py (pass with --profile).
#
# These values match the built-in neutral defaults, so passing this file
# unchanged changes nothing: it just proves the engine is config-driven. To
# re-skin a document, copy this file and edit the values (or generate one from
# a corporate Word template via a template-analysis stage).
#
# Colours are 6-hex, no leading '#'. Unknown keys are ignored.

font: Arial            # body + heading + table font (global fallback)

# Per-named-style font overrides (issue #97): a source template can define a
# distinct font for a specific paragraph style (e.g. a Quote or Caption style
# using a different typeface than body text). `render import-template` derives
# this block automatically by walking the source template's styles.xml; only
# genuine overrides are emitted (a style resolving to the same font as 'font'
# above is left out). Any style not listed here falls back to 'font'.
# styles:
#   Quote:
#     font: Georgia

accent: "1F3864"       # headings, table header-row fill, cover version line
body: "262626"         # reference-profile body text (near-black, reader-friendly)
body_muted: "595959"   # subtitle / compact-profile body / figure captions
table_body: "333333"   # table cell text
zebra: "F2F4F7"        # alternate-row shading (reference profile)

page_width_cm: 21.0    # A4
page_height_cm: 29.7
margin_cm: 2.0         # uniform top/bottom/left/right

# Optional marking behaviour (all rules default to empty = no marking edits).
# Each *_replacements entry is a mapping {find: [str, ...], replace: str}: when
# any find-string is present in a header/footer paragraph and the replace-string
# is not already present, the find-string is replaced.
#
# ONLY ONE of the two keys below is read per render, chosen by --profile -- they
# are NOT both applied, and a rule under the wrong one for the profile you're
# rendering with silently does nothing (render logs a WARN if a configured
# find-string never matched anything, naming which key was actually active).
# The example below shows them deliberately DIFFERENT (compact = internal
# working copy keeps "INTERNAL USE ONLY"; reference = external/brief-facing
# copy downgrades it), which is a real, supported use case, not a copy-paste
# mistake -- but if you just want ONE marking regardless of which profile a
# consumer renders with, put the SAME find/replace rule under both keys.
#
# classification:
#   # Read when --profile compact (fix_header_footer_text).
#   header_footer_replacements:
#     - find: ["INTERNAL USE ONLY"]
#       replace: "INTERNAL USE ONLY (POLICY-REF)"
#   # Read when --profile reference (apply_brief_classification_marking),
#   # per-run so the PAGE field in the footer survives the swap.
#   brief_replacements:
#     - find: ["INTERNAL USE ONLY (POLICY-REF)"]
#       replace: "GENERAL DISTRIBUTION (POLICY-REF)"
#   # Cover cleanup: front-matter paragraphs starting with one of these prefixes
#   # (or containing one of these substrings) are removed from the cover page;
#   # page markings belong in the header/footer, not the cover body.
#   strip_cover_banner_prefixes: ["Classification:", "Distribution:"]
#   strip_cover_banner_contains: []

# Cover behaviour (reference profile); the values below are the defaults.
cover:
  part_heading_prefix: "Part"                  # H1 prefix that marks the document body start
  version_label: "Version {version} - {date}"  # cover line; segments with a missing value are dropped

# House punctuation normalization (unicode dashes/quotes/NBSP to ASCII) applied
# to body text and headers/footers. Set false to leave punctuation untouched.
normalize_punctuation: true

# Custom document properties (issue #105's sibling feature, docstyle/custom_properties.py):
# written into docProps/custom.xml (File > Info > Properties > Advanced in Word), and used
# to fill in the cached display text of any [ ]{.docproperty name="..."} markdown span
# (docstyle/filters/doc-properties.lua) bound to the same name. `type` is one of
# text|number|bool|date (default text); `date` values are YYYY-MM-DD (a bare date is
# normalized to midnight UTC). A property declared here but never referenced by a
# .docproperty span is still written -- it just has no visible field anywhere. A
# .docproperty span referencing a name NOT declared here is left as its placeholder,
# with a NOTE printed naming the unbound name.
# custom_properties:
#   ClientName:
#     type: text
#     value: ""
#   ApprovedBudget:
#     type: number
#     value: 0
#   IsConfidential:
#     type: bool
#     value: false
#   ReviewDate:
#     type: date
#     value: "2026-01-01"
